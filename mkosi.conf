[Config]
MinimumVersion=26~devel
Profiles=core,snap,ubuntu-desktop,apparmor

[Distribution]
Distribution=ubuntu
Release=questing
Repositories=main,restricted,universe,multiverse

[Content]
Hostname=ubuntu-atomic-remix

[Build]
ToolsTree=default
History=yes
CacheDirectory=mkosi.cache
Incremental=yes

[Validation]
SecureBoot=no
SignExpectedPcr=no

[Output]
ImageId=ubuntu-atomic-remix
OutputDirectory=mkosi.output
ManifestFormat=json
Output=%i_%v_%a
Format=oci
OciAnnotations=org.opencontainers.image.ref.name=ubuntu-atomic-remix
Bootable=no